<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>MVS CERBERUS</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    /* ────────────────────────────────────────────────────────────────────
       MVS CERBERUS — amber phosphor CRT auth screen
       ──────────────────────────────────────────────────────────────────── */

    :root {
      --phosphor: #ffb000;          /* primary amber */
      --phosphor-dim: #b87800;      /* secondary amber */
      --phosphor-bright: #ffd479;   /* highlight */
      --bg: #0a0805;
      --bezel: #2a2a2a;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      background: var(--bezel);
      color: var(--phosphor);
      font-family: "Px437 IBM VGA8", "Consolas", "Lucida Console", monospace;
      overflow: hidden;
    }

    /* The CRT canvas — banner image as backdrop, contained */
    .crt {
      position: absolute;
      inset: 0;
      background: var(--bg) url('/static/cerberus-banner.png') no-repeat center center;
      background-size: contain;
    }

    /* Scanline overlay for that proper CRT feel */
    .scanlines {
      position: absolute;
      inset: 0;
      pointer-events: none;
      background: repeating-linear-gradient(
        to bottom,
        rgba(0,0,0,0) 0px,
        rgba(0,0,0,0) 2px,
        rgba(0,0,0,0.18) 3px,
        rgba(0,0,0,0) 4px
      );
      mix-blend-mode: multiply;
    }

    /* Subtle phosphor glow + flicker */
    .glow {
      position: absolute;
      inset: 0;
      pointer-events: none;
      background: radial-gradient(
        ellipse at center,
        rgba(255,176,0,0.06) 0%,
        rgba(0,0,0,0.35) 100%
      );
      animation: flicker 4.2s infinite;
    }
    @keyframes flicker {
      0%, 100% { opacity: 1; }
      48%      { opacity: 0.96; }
      52%      { opacity: 1; }
      83%      { opacity: 0.94; }
      86%      { opacity: 1; }
    }

    /* The form overlay — positioned over the LOGON ID / PASSWORD area
       in the banner image. Percentages so it stays glued to the right
       spot as the viewport scales. */
    .logon {
      position: absolute;
      left: 50%;
      bottom: 9%;
      transform: translateX(-50%);
      width: 60ch;
      max-width: 90vw;
      font-size: clamp(14px, 1.6vw, 22px);
      text-shadow: 0 0 4px rgba(255,176,0,0.6);
    }

    .logon .row {
      display: grid;
      grid-template-columns: 14ch 1fr;
      align-items: baseline;
      column-gap: 0;
      margin: 0.15em 0;
    }

    .logon label {
      color: var(--phosphor);
      letter-spacing: 0.05em;
    }

    .logon input {
      background: transparent;
      border: none;
      outline: none;
      color: var(--phosphor-bright);
      font: inherit;
      caret-color: var(--phosphor-bright);
      padding: 0;
      width: 100%;
      letter-spacing: 0.08em;
      text-shadow: 0 0 6px rgba(255,212,121,0.8);
    }
    .logon input::placeholder {
      color: var(--phosphor-dim);
      opacity: 0.4;
    }

    /* The submit row is hidden — enter submits. We show a status line instead. */
    .controls {
      display: flex;
      justify-content: space-between;
      margin-top: 0.6em;
      font-size: 0.85em;
      color: var(--phosphor-dim);
    }

    .err {
      color: #ff5555;
      text-shadow: 0 0 6px rgba(255,85,85,0.7);
      margin-top: 0.3em;
      letter-spacing: 0.05em;
      animation: blink 1.1s steps(2, end) infinite;
    }
    @keyframes blink {
      50% { opacity: 0.35; }
    }

    /* Blinking cursor on the focused input */
    .logon input:focus {
      animation: cursor 1.06s steps(2, end) infinite;
    }
    @keyframes cursor {
      50% { caret-color: transparent; }
    }

    /* Hide the native submit visually but keep it for Enter */
    button[type="submit"] {
      position: absolute;
      left: -9999px;
    }

    /* Tiny system footer */
    .footer {
      position: absolute;
      bottom: 0.5%;
      left: 2%;
      font-size: 11px;
      color: var(--phosphor-dim);
      letter-spacing: 0.08em;
      opacity: 0.5;
    }
  </style>
</head>
<body>
  <div class="crt">
    <form class="logon" method="POST" action="/auth" autocomplete="off">
      <div class="row">
        <label for="logon_id">LOGON ID ===&gt;</label>
        <input type="text" id="logon_id" name="logon_id" autofocus
               autocapitalize="characters" spellcheck="false"
               maxlength="32" required>
      </div>
      <div class="row">
        <label for="password">PASSWORD ===&gt;</label>
        <input type="password" id="password" name="password"
               maxlength="64" required>
      </div>
      {% if error %}
        <div class="err">{{ error }}</div>
      {% else %}
        <div class="controls">
          <span>ENTER TO SUBMIT</span>
          <span>SYSTEM STATUS: SECURED</span>
        </div>
      {% endif %}
      <button type="submit">LOGON</button>
    </form>
    <div class="glow"></div>
    <div class="scanlines"></div>
    <div class="footer">CERBERUS GATE v1.0 &nbsp;|&nbsp; tso3270.com</div>
  </div>
</body>
</html>
